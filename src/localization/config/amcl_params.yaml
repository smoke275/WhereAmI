# Overall filter
min_particles: 500
max_particles: 2000
kld_err: 0.05
kld_z: 0.99

update_min_d: 0.2       # min distance (m) robot must move before filter update
update_min_a: 0.5       # min angle (rad) robot must rotate before filter update
resample_interval: 1

transform_tolerance: 0.5

# Laser model (likelihood_field)
laser_max_beams: 30
laser_z_hit: 0.95
laser_z_short: 0.1
laser_z_max: 0.05
laser_z_rand: 0.05
laser_sigma_hit: 0.2
laser_likelihood_max_dist: 2.0
laser_model_type: likelihood_field

# Odometry model (diff-corrected)
# Odometry comes from Gazebo (ground truth), so noise is minimal
odom_alpha1: 0.2
odom_alpha2: 0.2
odom_alpha3: 0.2
odom_alpha4: 0.2
odom_alpha5: 0.1
