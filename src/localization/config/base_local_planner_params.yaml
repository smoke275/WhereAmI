controller_frequency: 10

TrajectoryPlannerROS:
  max_vel_x: 0.5
  min_vel_x: 0.1
  max_vel_theta: 1.0

  min_in_place_vel_theta: 0.314

  acc_lim_theta: 3.14
  acc_lim_x: 2.0
  acc_lim_y: 2.0

  sim_time: 2.0

  vx_samples: 10
  vtheta_samples: 20

  pdist_scale: 0.8
  gdist_scale: 0.6
  occdist_scale: 0.1

  holonomic_robot: false
  meter_scoring: true
